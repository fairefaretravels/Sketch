<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Detroit — Etch A Sketch</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #1a0a0a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Courier New', monospace;
    padding: 20px;
  }

  h1 {
    color: #e8c060;
    font-size: 13px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    margin-bottom: 16px;
    opacity: 0.7;
  }

  .etch-frame {
    background: #c0392b;
    border-radius: 22px;
    padding: 22px 30px 28px;
    box-shadow:
      inset 0 6px 18px rgba(0,0,0,0.45),
      0 8px 40px rgba(0,0,0,0.7),
      inset 0 -4px 10px rgba(180,40,20,0.4);
    width: 100%;
    max-width: 720px;
  }

  .top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
  }

  .mode-group {
    display: flex;
    gap: 6px;
  }

  .mode-btn {
    background: rgba(0,0,0,0.3);
    color: #f0c8a0;
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 5px;
    padding: 5px 11px;
    font-size: 11px;
    font-family: 'Courier New', monospace;
    cursor: pointer;
    letter-spacing: 0.08em;
    transition: background 0.15s;
  }
  .mode-btn:hover { background: rgba(0,0,0,0.5); }
  .mode-btn.active { background: #e8c060; color: #3a1500; border-color: #e8c060; font-weight: bold; }

  .stats {
    display: flex;
    gap: 16px;
    font-size: 11px;
    color: #f0c8a0;
    letter-spacing: 0.05em;
  }
  .stats span { opacity: 0.75; }
  .stats strong { opacity: 1; color: #e8c060; }

  .screen-wrap {
    background: #9a9a88;
    border-radius: 10px;
    border: 8px solid #6a6858;
    box-shadow:
      inset 0 3px 10px rgba(0,0,0,0.6),
      inset 0 0 0 2px rgba(255,255,255,0.05);
    position: relative;
    overflow: hidden;
    cursor: crosshair;
    touch-action: none;
  }

  canvas {
    display: block;
    width: 100%;
    height: auto;
  }

  .lift-warn {
    position: absolute;
    top: 10px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(232,192,96,0.92);
    color: #3a1500;
    font-size: 11px;
    font-family: 'Courier New', monospace;
    padding: 4px 12px;
    border-radius: 4px;
    letter-spacing: 0.1em;
    pointer-events: none;
    display: none;
    font-weight: bold;
  }

  .knob-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 14px;
  }

  .knob-group {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }

  .knob {
    width: 58px;
    height: 58px;
    background: conic-gradient(from 0deg, #c8a840, #e8d080, #c8a840, #a07828, #c8a840);
    border-radius: 50%;
    border: 4px solid #806020;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    box-shadow:
      3px 3px 8px rgba(0,0,0,0.5),
      inset 0 2px 4px rgba(255,255,255,0.2);
    font-size: 9px;
    color: #4a3010;
    font-weight: bold;
    letter-spacing: 0.05em;
    position: relative;
    user-select: none;
    -webkit-user-select: none;
  }

  .knob::after {
    content: '';
    width: 10px;
    height: 10px;
    background: #4a3010;
    border-radius: 50%;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
  }

  .knob-label {
    font-size: 9px;
    color: #f0d8c0;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    opacity: 0.6;
  }

  .action-btns {
    display: flex;
    flex-direction: column;
    gap: 8px;
    align-items: center;
  }

  .btn-row { display: flex; gap: 8px; }

  .etch-btn {
    background: rgba(0,0,0,0.35);
    color: #f0c8a0;
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 6px;
    padding: 7px 16px;
    font-size: 11px;
    font-family: 'Courier New', monospace;
    cursor: pointer;
    letter-spacing: 0.08em;
    transition: background 0.15s, transform 0.1s;
  }
  .etch-btn:hover { background: rgba(0,0,0,0.55); }
  .etch-btn:active { transform: scale(0.96); }
  .etch-btn.shake-btn { color: #e8c060; border-color: rgba(232,192,96,0.3); }

  .brand {
    font-size: 10px;
    color: rgba(240,200,160,0.35);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    text-align: center;
    margin-top: 6px;
  }

  .instructions {
    color: rgba(240,200,160,0.4);
    font-size: 10px;
    letter-spacing: 0.06em;
    text-align: center;
    margin-top: 12px;
    line-height: 1.7;
  }

  @media (max-width: 500px) {
    .etch-frame { padding: 14px 14px 20px; }
    .knob { width: 44px; height: 44px; }
    .etch-btn { padding: 6px 10px; font-size: 10px; }
  }
</style>
</head>
<body>

<h1>Detroit — Draw The City</h1>

<div class="etch-frame">

  <div class="top-bar">
    <div class="mode-group">
      <button class="mode-btn active" id="btn-free" onclick="setMode('free')">Free</button>
      <button class="mode-btn" id="btn-trace" onclick="setMode('trace')">Trace</button>
      <button class="mode-btn" id="btn-knob" onclick="setMode('knob')">Knobs</button>
    </div>
    <div class="stats">
      <span>Path: <strong id="lineLen">0</strong>px</span>
      <span>Lifts: <strong id="liftCount">0</strong></span>
    </div>
  </div>

  <div class="screen-wrap" id="screenWrap">
    <canvas id="etchCanvas"></canvas>
    <div class="lift-warn" id="liftWarn">LINE LIFTED</div>
  </div>

  <div class="knob-row">
    <div class="knob-group">
      <div class="knob" id="knobL" title="Horizontal — click left/right half"></div>
      <div class="knob-label">Horizontal</div>
    </div>

    <div class="action-btns">
      <div class="btn-row">
        <button class="etch-btn shake-btn" onclick="shakeErase()">Shake to erase</button>
        <button class="etch-btn" onclick="toggleGhost()">Ghost skyline</button>
      </div>
      <div class="btn-row">
        <button class="etch-btn" onclick="undoLast()">Undo</button>
        <button class="etch-btn" onclick="exportImg()">Save image</button>
      </div>
    </div>

    <div class="knob-group">
      <div class="knob" id="knobR" title="Vertical — click top/bottom half"></div>
      <div class="knob-label">Vertical</div>
    </div>
  </div>

  <div class="brand">Sanecatv.com · Detroit</div>
</div>

<div class="instructions">
  Free / Trace: click &amp; drag to draw &nbsp;·&nbsp; Knobs: arrow keys or click knob halves<br>
  One continuous line — every lift counts against you
</div>

<script>
const canvas = document.getElementById('etchCanvas');
const ctx = canvas.getContext('2d');
const wrap = document.getElementById('screenWrap');

let W, H;
function resize() {
  const cw = wrap.clientWidth - 0;
  W = cw;
  H = Math.round(cw * 0.52);
  canvas.width = W;
  canvas.height = H;
  redrawAll();
}

let mode = 'free';
let drawing = false;
let lastX, lastY;
let lineLen = 0, lifts = 0;
let showGhost = false;
let shaking = false;
let segments = [];
let currentSeg = [];

function setMode(m) {
  mode = m;
  ['free','trace','knob'].forEach(x => {
    document.getElementById('btn-'+x).classList.toggle('active', x === m);
  });
  if (m === 'trace') showGhost = true;
  redrawAll();
}

function skylinePoints() {
  const pts = [
    [0,0.85],[0.04,0.85],[0.04,0.7],[0.07,0.7],[0.07,0.6],[0.10,0.6],[0.10,0.72],
    [0.13,0.72],[0.13,0.55],[0.16,0.55],[0.16,0.48],[0.19,0.48],[0.19,0.6],
    [0.22,0.6],[0.22,0.38],[0.235,0.38],[0.235,0.28],[0.245,0.28],[0.245,0.22],
    [0.255,0.18],[0.265,0.22],[0.265,0.28],[0.275,0.28],[0.275,0.38],[0.29,0.38],
    [0.29,0.52],[0.31,0.52],[0.31,0.42],[0.33,0.42],[0.35,0.55],
    [0.42,0.55],[0.42,0.30],[0.435,0.30],[0.435,0.25],[0.455,0.25],[0.455,0.30],
    [0.47,0.30],[0.47,0.55],
    [0.52,0.55],[0.52,0.42],[0.54,0.42],[0.54,0.52],[0.57,0.52],
    [0.57,0.38],[0.585,0.38],[0.585,0.30],[0.60,0.30],[0.60,0.38],
    [0.62,0.38],[0.62,0.60],[0.68,0.60],[0.68,0.72],
    [0.72,0.72],[0.72,0.55],[0.76,0.55],[0.76,0.65],[0.82,0.65],
    [0.82,0.75],[0.88,0.75],[0.88,0.80],[1.0,0.80],[1.0,1.0],[0,1.0],[0,0.85]
  ];
  return pts.map(([px,py]) => [px*W, py*H]);
}

function drawGhost() {
  ctx.save();
  ctx.globalAlpha = 0.13;
  ctx.strokeStyle = '#1a1a10';
  ctx.lineWidth = 1.5;
  ctx.setLineDash([4,4]);
  ctx.fillStyle = 'rgba(20,20,10,0.06)';
  const pts = skylinePoints();
  ctx.beginPath();
  ctx.moveTo(pts[0][0], pts[0][1]);
  pts.forEach(([x,y]) => ctx.lineTo(x,y));
  ctx.closePath();
  ctx.fill();
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.restore();

  ctx.save();
  ctx.globalAlpha = 0.18;
  ctx.fillStyle = '#1a1a10';
  ctx.font = `bold ${Math.round(W*0.016)}px Courier New`;
  ctx.fillText('Little Caesars Arena', W*0.36, H*0.62);
  ctx.fillText('Fisher Building', W*0.23, H*0.16);
  ctx.fillText('Woodward Ave →', W*0.50, H*0.48);
  ctx.restore();
}

function redrawAll() {
  ctx.fillStyle = '#b4b4a0';
  ctx.fillRect(0,0,W,H);

  if (showGhost) drawGhost();

  ctx.strokeStyle = '#1e1e14';
  ctx.lineWidth = 1.8;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';

  segments.forEach(seg => {
    if (seg.length < 2) return;
    ctx.beginPath();
    ctx.moveTo(seg[0][0], seg[0][1]);
    seg.forEach(([x,y]) => ctx.lineTo(x,y));
    ctx.stroke();
  });

  if (currentSeg.length >= 2) {
    ctx.beginPath();
    ctx.moveTo(currentSeg[0][0], currentSeg[0][1]);
    currentSeg.forEach(([x,y]) => ctx.lineTo(x,y));
    ctx.stroke();
  }
}

function getPos(e) {
  const r = canvas.getBoundingClientRect();
  const scaleX = canvas.width / r.width;
  const scaleY = canvas.height / r.height;
  if (e.touches) {
    return [
      (e.touches[0].clientX - r.left) * scaleX,
      (e.touches[0].clientY - r.top) * scaleY
    ];
  }
  return [
    (e.clientX - r.left) * scaleX,
    (e.clientY - r.top) * scaleY
  ];
}

function startDraw(x, y) {
  if (mode === 'knob') return;
  if (drawing) return;
  if (lineLen > 0) {
    lifts++;
    document.getElementById('liftCount').textContent = lifts;
    const w = document.getElementById('liftWarn');
    w.style.display = 'block';
    setTimeout(() => w.style.display = 'none', 900);
    if (currentSeg.length) segments.push([...currentSeg]);
    currentSeg = [];
  }
  drawing = true;
  currentSeg = [[x,y]];
  lastX = x; lastY = y;
}

function continueDraw(x, y) {
  if (!drawing || mode === 'knob') return;
  const dx = x-lastX, dy = y-lastY;
  const d = Math.sqrt(dx*dx+dy*dy);
  if (d < 2) return;
  currentSeg.push([x,y]);
  lineLen += Math.round(d);
  document.getElementById('lineLen').textContent = lineLen;
  lastX = x; lastY = y;
  redrawAll();
}

function endDraw() {
  drawing = false;
  if (currentSeg.length > 1) {
    segments.push([...currentSeg]);
    currentSeg = [];
  }
}

canvas.addEventListener('mousedown', e => { const [x,y]=getPos(e); startDraw(x,y); });
canvas.addEventListener('mousemove', e => { const [x,y]=getPos(e); continueDraw(x,y); });
canvas.addEventListener('mouseup', endDraw);
canvas.addEventListener('mouseleave', endDraw);
canvas.addEventListener('touchstart', e => { e.preventDefault(); const [x,y]=getPos(e); startDraw(x,y); }, {passive:false});
canvas.addEventListener('touchmove', e => { e.preventDefault(); const [x,y]=getPos(e); continueDraw(x,y); }, {passive:false});
canvas.addEventListener('touchend', endDraw);

let knobInterval = null;
function startKnob(dx, dy) {
  if (mode !== 'knob') return;
  if (knobInterval) clearInterval(knobInterval);
  if (!lastX) { lastX = W/2; lastY = H/2; }
  knobInterval = setInterval(() => {
    const nx = Math.max(1, Math.min(W-1, lastX+dx));
    const ny = Math.max(1, Math.min(H-1, lastY+dy));
    currentSeg.push([nx,ny]);
    lineLen += Math.round(Math.abs(dx)+Math.abs(dy));
    document.getElementById('lineLen').textContent = lineLen;
    lastX=nx; lastY=ny;
    redrawAll();
  }, 28);
}
function stopKnob() { clearInterval(knobInterval); knobInterval=null; }

const knobL = document.getElementById('knobL');
const knobR = document.getElementById('knobR');
knobL.addEventListener('mousedown', e => {
  const r = knobL.getBoundingClientRect();
  startKnob(e.clientX < r.left+r.width/2 ? -4 : 4, 0);
});
knobR.addEventListener('mousedown', e => {
  const r = knobR.getBoundingClientRect();
  startKnob(0, e.clientY < r.top+r.height/2 ? -4 : 4);
});
document.addEventListener('mouseup', stopKnob);

document.addEventListener('keydown', e => {
  if (mode !== 'knob') return;
  const spd = 4;
  const map = {ArrowLeft:[-spd,0],ArrowRight:[spd,0],ArrowUp:[0,-spd],ArrowDown:[0,spd]};
  if (map[e.key]) { e.preventDefault(); startKnob(...map[e.key]); }
});
document.addEventListener('keyup', e => {
  if (['ArrowLeft','ArrowRight','ArrowUp','ArrowDown'].includes(e.key)) stopKnob();
});

function undoLast() {
  if (segments.length) {
    segments.pop();
    redrawAll();
  }
}

function shakeErase() {
  if (shaking) return;
  shaking = true;
  let count = 0;
  const interval = setInterval(() => {
    wrap.style.transform = `translate(${(Math.random()-.5)*14}px,${(Math.random()-.5)*8}px) rotate(${(Math.random()-.5)*2}deg)`;
    count++;
    if (count > 14) {
      clearInterval(interval);
      wrap.style.transform = '';
      shaking = false;
      segments = []; currentSeg = [];
      lineLen = 0; lifts = 0; drawing = false;
      document.getElementById('lineLen').textContent = 0;
      document.getElementById('liftCount').textContent = 0;
      redrawAll();
    }
  }, 45);
}

function toggleGhost() {
  showGhost = !showGhost;
  redrawAll();
}

function exportImg() {
  const link = document.createElement('a');
  link.download = 'detroit-etch.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
}

window.addEventListener('resize', resize);
resize();
</script>
</body>
</html>
